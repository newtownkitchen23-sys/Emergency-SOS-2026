name: Emergency SOS Final Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # This action builds the APK even if gradlew is missing from your repo
      - name: Build Android APK
        uses: nttld/setup-ndk@v1 # Ensures NDK is ready if needed
      
      - name: Build with Gradle Action
        uses: gradle/gradle-build-action@v3
        with:
          arguments: assembleDebug

      - name: Upload APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: emergency-sos-apk
          path: "**/*.apk"
